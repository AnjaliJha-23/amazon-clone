<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <header>
        <div class="navbar" >
            <div class="nav-logo border">
                <div class="logo"></div>
            </div>
            <!-- /*box 2*/ -->
            <div class="address border">
                <p class="first_add">Deliver to</p>
                <div class="add-logo">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="second_add">India</p>
                </div>
            </div>
            <!--box 3-->
            <div class="search-bar border">
                <select class="Search" >
                    <option id="o1">All</option>
                    <option id="o2">Alexa Skills</option>
                    <option id="o3">Amazon Devices</option>
                    <option id="o4">Amazon Fashion</option>
                    <option id="o5">Amazon Fresh</option>
                    <option id="o6">Amazon Devices</option>
                    <option id="o7">Baby</option>
                    <option id="o8">Amazon Pharmacy</option>
                    <option id="o9">Subscribe and save</option>
                    <option id="o10">Kids and Toys</option>
                </select>
                <input class="search-input" placeholder="Search On Amazon">
                <div class="search-icon">
                    <i class="fa-solid fa-magnifying-glass" ></i>
                </div>
            </div>
        </div>
           
    </header>
</body>
</html>
